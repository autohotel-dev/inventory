service: luxor-backend

frameworkVersion: '3 || 4'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    # Database URL se inyectará desde archivo .env o CI/CD
    DATABASE_URL: ${env:DATABASE_URL, ''}

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin

useDotenv: true

custom:
  pythonRequirements:
    # Asegura que compila binarios compatibles con AWS Lambda si hay C-extensions
    dockerizePip: non-linux 
    zip: true 
    slim: true

package:
  patterns:
    - '!node_modules/**'
    - '!.serverless/**'
    - '!venv/**'
    - '!__pycache__/**'
    - '!.pytest_cache/**'
    - '!.env'

functions:
  api:
    handler: main.handler
    events:
      - httpApi: '*'

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: luxor-user-pool-${sls:stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: luxor-app-client-${sls:stage}
        UserPoolId:
          Ref: CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ADMIN_NO_SRP_AUTH
          - USER_PASSWORD_AUTH

  Outputs:
    CognitoUserPoolId:
      Value:
        Ref: CognitoUserPool
      Export:
        Name: LuxorUserPoolId-${sls:stage}
    CognitoUserPoolClientId:
      Value:
        Ref: CognitoUserPoolClient
      Export:
        Name: LuxorUserPoolClientId-${sls:stage}
